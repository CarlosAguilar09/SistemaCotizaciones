name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Generate production config
        run: |
          @{
            Environment = "Production"
            ConnectionStrings = @{
              DefaultConnection = "${{ secrets.DATABASE_URL }}"
            }
          } | ConvertTo-Json | Set-Content -Path appsettings.Production.json

      - name: Publish application
        run: dotnet publish -c Release -r win-x64 --self-contained -o ./publish

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package with Velopack
        run: vpk pack --packId SistemaCotizaciones --packVersion ${{ steps.version.outputs.VERSION }} --packDir ./publish --mainExe SistemaCotizaciones.exe --outputDir ./releases

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./releases/*
